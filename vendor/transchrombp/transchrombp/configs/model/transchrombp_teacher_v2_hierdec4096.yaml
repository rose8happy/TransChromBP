# Corrected-B E2 scaffold with a dedicated hierarchical encoder-decoder.
# Keep center-pool count semantics, ChromBPNet bias pooling, and additive/logsumexp
# fusion unchanged; only swap the debiased student backbone to the hierarchical
# encoder-decoder variant over a 4096bp input window.

model_name: transchrombp_teacher_v2_hierdec4096

architecture:
  variant: hierarchical_encoder_decoder_v1
  stem_channels: 128
  downsample_channels: [128, 256]

sequence_encoder:
  enabled: true
  d_model: 256
  n_heads: 8
  n_layers: 6
  ff_mult: 4
  dropout: 0.1
  use_rope: true
  rope_theta: 10000.0
  max_len: 4096
  use_sdpa: true

conv_stem:
  stem_kernel_size: 21
  conv_kernel_size: 7

bias_branch:
  enabled: true
  hidden_channels: 128
  kernel_size: 21
  n_dil_layers: 4
  pretrained_path: ""
  freeze_bias_core: false
  profile_pool_factor: 32

fusion:
  profile_fusion: add
  count_fusion: logsumexp
  profile_scale_init: 1.0
  count_scale_init: 1.0
  learnable_scales: true
  positive_scales: true
  profile_bias_stop_gradient: true

heads:
  profile_output_len: 1000
  count_head: linear
  count_pool_mode: center
