# Benchmark config — derived from train_tutorial_teacher_v2_main.yaml
# Purpose: short-run performance diagnosis (controlled by --dry-run-steps)
# Changes vs main experiment:
#   - max_epochs: 999 (effectively unlimited, --dry-run-steps controls length)
#   - validate_every_epochs: 999 (skip validation)
#   - checkpoint_every_epochs: 999 (skip checkpointing)
#   - early_stop_patience: 0 (disable early stopping)
#   - log_every_steps: 10 (more frequent logging)
#   - run_name: benchmark (overridden by launch script)
# All other parameters IDENTICAL to teacher_v2_main

seed: 1234
max_epochs: 999

trainer:
  backend: nccl
  precision: bf16
  grad_accum_steps: 1
  clip_grad_norm: 1.0
  log_every_steps: 10
  validate_every_epochs: 999
  checkpoint_every_epochs: 999
  find_unused_parameters: false
  compile: false
  strict_max_len_check: true
  best_metric: peak.loss_total
  best_metric_mode: min
  early_stop_patience: 0
  early_stop_min_delta: 0.0

optimizer:
  name: adamw
  learning_rate: 5.0e-4
  weight_decay: 0.01
  betas: [0.9, 0.95]

loss:
  profile_weight: 1.0
  count_weight: 0.1
  debiased_profile_weight: 2.0
  debiased_count_weight: 0.0

schedule:
  name: cosine
  warmup_steps: 0
  warmup_ratio: 0.06
  min_lr_ratio: 0.1

data:
  source: chrombpnet_bigwig
  config_path: configs/data/data_tutorial_canonical_v1.yaml
  max_seq_len: 2114
  input_len: 2114
  output_len: 1000
  supervised_bp: 1000
  profile_bin_size: 1
  batch_size_per_gpu: 16
  num_workers: 2
  pin_memory: true
  prefetch_factor: 2
  persistent_workers: true
  region_source: both
  train_region_source: both
  val_region_source: both
  nonpeak_ratio: 0.1
  max_jitter: 500
  peak_max_jitter: 500
  nonpeak_max_jitter: 0
  train_revcomp: true
  val_revcomp: false
  revcomp_prob: 0.5
  track_total_count_target: 0.0

logging:
  output_dir: /data1/zhoujiazhen/bylw_atac/TransChromBP/outputs
  run_name: benchmark
